# base-url=http>//localhost:5173

spring.application.name=echotranscribe-db
spring.data.mongodb.uri=${MONGODB_URI}

subscription.sharing.maxuser=${SUBSCRIPTION_MAX_SHARING}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.audience=${JWT_AUDIENCE}

auth0.domain=${AUTH0_DOMAIN}
auth0.client-id= ${AUTH0_CLIENT_ID}
auth0.client-secret= ${AUTH0_CLIENT_SECRET}
auth0.audience=${AUTH0_AUDIENCE}

gcloud.bucket-name=${GCLOUD_BUCKET_NAME}
gcloud.location=${GCLOUD_LOCATION}
gcloud.project-id=${GCLOUD_PROJECT_ID}
gcloud.model-speech-to-text=${GCLOUD_MODEL}

openai.api-key=${OPENAI_API_KEY}
stripe.secret.key=${STRIPE_SECRET_KEY}

logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=DEBUG
logging.level.reactor.netty.http.client.HttpClient=DEBUG

spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=550MB
spring.servlet.multipart.location=/tmp