version: '3.8'
services:

  # ─────────────────────────────────────────
  # Backend Spring Boot
  # ─────────────────────────────────────────
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
      
    container_name: springboot-back
    restart: unless-stopped
    env_file:
      - ./back/.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # SERVER_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - app-network

  # ─────────────────────────────────────────
  # Frontend React TypeScript
  # ─────────────────────────────────────────
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
        # REACT_APP_API_URL: http://localhost:8080
    container_name: react-front
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - back
    networks:
      - app-network

# ─────────────────────────────────────────
# Volumes & Réseaux
# ─────────────────────────────────────────
networks:
  app-network:
    driver: bridge